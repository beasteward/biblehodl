services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      - DATABASE_URL=file:/data/app.db
    depends_on:
      relay:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  relay:
    image: scsibug/nostr-rs-relay:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./config/relay-config.toml:/usr/src/app/config.toml:ro
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout: 5s
      retries: 3

  blossom:
    # Built from official repo: https://github.com/hzrd149/blossom-server
    build:
      context: ./blossom-server
    restart: unless-stopped
    ports:
      - "3100:3000"
    volumes:
      - blossom-data:/app/data
      - ./config/blossom-config.yml:/app/config.yml:ro
    environment:
      - BLOSSOM_DOMAIN=files.${DOMAIN}
      - BLOSSOM_ADMIN_USER=${BLOSSOM_ADMIN_USER:-admin}
      - BLOSSOM_ADMIN_PASS=${BLOSSOM_ADMIN_PASS}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    env_file: .env
    depends_on:
      - app
      - relay
      - blossom

  # Optional: CPDV Bible API
  # Most communities can use the shared instance at cpdv-bible-production.up.railway.app
  # Uncomment to run your own:
  #
  # bible-api:
  #   build:
  #     context: ../CPDV-Bible
  #   restart: unless-stopped
  #   ports:
  #     - "4000:4000"
  #   environment:
  #     - PORT=4000

volumes:
  blossom-data:
